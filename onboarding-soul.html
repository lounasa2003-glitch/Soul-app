<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUL — Bienvenida</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #07050a;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Estrellas de fondo */
  .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 4s infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--max-op, 0.6); }
  }

  /* Sistema de astros orbitando — encabezado fijo arriba */
  .orbit-system {
    position: relative;
    width: 170px;
    height: 170px;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeInSystem 2s ease forwards 0.2s;
    z-index: 1;
    flex-shrink: 0;
  }
  @keyframes fadeInSystem { to { opacity: 1; } }

  .core-glow {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.5), rgba(201,168,76,0.08) 60%, transparent 100%);
    transform: translate(-50%, -50%);
    animation: corePulse 3.5s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
  }

  .core-dot {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #f5d98a;
    box-shadow: 0 0 12px 3px rgba(245,217,138,0.7);
    transform: translate(-50%, -50%);
  }

  .orbit-path {
    position: absolute;
    left: 50%;
    top: 50%;
    border: 1px solid rgba(201,168,76,0.14);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  .orbit-path.o1 { width: 110px; height: 110px; animation: spin 14s linear infinite; }
  .orbit-path.o2 { width: 175px; height: 175px; animation: spin 22s linear infinite reverse; }
  .orbit-path.o3 { width: 250px; height: 175px; animation: spin 30s linear infinite; }

  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  .orbiter {
    position: absolute;
    border-radius: 50%;
  }
  .orbiter.gold {
    background: radial-gradient(circle, #f5d98a, #c9a84c 70%, transparent 100%);
    box-shadow: 0 0 10px 3px rgba(201,168,76,0.5);
  }
  .orbiter.silver {
    background: radial-gradient(circle, #e6e9f0, #a8b0c2 70%, transparent 100%);
    box-shadow: 0 0 10px 3px rgba(168,176,194,0.45);
  }
  .orbiter.dim {
    background: rgba(242,236,228,0.55);
  }

  .text-zone {
    position: relative;
    width: 100%;
    height: 260px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Contenido de texto - secuencial */
  .act {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
    margin: 0 auto;
    max-width: 600px;
    padding: 0 1.5rem;
    opacity: 0;
    width: 100%;
    z-index: 3;
  }

  .act-1 {
    animation: actFadeInOut 4s ease forwards 2s;
  }

  .act-2 {
    animation: actFadeInOut 5s ease forwards 6s;
  }

  .act-3 {
    animation: actFadeIn 1.5s ease forwards 11s;
  }

  @keyframes actFadeInOut {
    0% { opacity: 0; transform: translateY(10px); }
    15% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-10px); }
  }

  @keyframes actFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(1.8rem, 4.5vw, 2.6rem);
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #f5d98a, #c9a84c 50%, #e6e9f0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .invite-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1rem, 2.2vw, 1.3rem);
    color: #b8aeb5;
    line-height: 1.7;
  }

  .question {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(1.15rem, 2.8vw, 1.6rem);
    color: #f2ece4;
    margin-bottom: 2.2rem;
    line-height: 1.5;
  }

  .buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-yes {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #8a6e2f, #c9a84c);
    color: #07050a;
    border: none;
    padding: 1rem 2.4rem;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,168,76,0.3); }

  .btn-no {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    color: #7a6e78;
    border: 1px solid #2a1f28;
    padding: 1rem 2.4rem;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-no:hover { color: #f2ece4; border-color: #7a6e78; }

  .replay {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: none;
    border: 1px solid #2a1f28;
    color: #7a6e78;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border-radius: 2px;
    cursor: pointer;
    z-index: 10;
  }
  .replay:hover { color: #c9a84c; border-color: #c9a84c; }

  @media (max-height: 700px) {
    .orbit-system { width: 200px; height: 200px; margin-bottom: 1.5rem; transform: scale(0.85); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="stars" id="stars"></div>

  <div class="orbit-system">
    <div class="core-glow"></div>
    <div class="core-dot"></div>

    <div class="orbit-path o1">
      <div class="orbiter gold" style="width:6px; height:6px; left:-3px; top:52px;"></div>
    </div>
    <div class="orbit-path o2">
      <div class="orbiter silver" style="width:5px; height:5px; left:84px; top:-2.5px;"></div>
    </div>
    <div class="orbit-path o3">
      <div class="orbiter dim" style="width:3px; height:3px; left:123px; top:-1.5px;"></div>
    </div>
  </div>

  <div class="text-zone">
    <div class="act act-1">
      <h1 class="brand">Bienvenido a Soul</h1>
    </div>
    <div class="act act-2">
      <p class="invite-text">Te invito a viajar por un universo de posibilidades,<br>donde el protagonista es tu mejor versión.</p>
    </div>
    <div class="act act-3">
      <p class="question">¿Estás preparado para pasar al próximo nivel?</p>
      <div class="buttons">
        <button class="btn-yes">Sí, estoy listo</button>
      </div>
    </div>
  </div>
</div>

<button class="replay" onclick="location.reload()">Repetir</button>

<script>
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--max-op', (Math.random() * 0.5 + 0.2).toFixed(2));
    star.style.animationDelay = (Math.random() * 4) + 's';
    star.style.animationDuration = (Math.random() * 3 + 3) + 's';
    starsContainer.appendChild(star);
  }
</script>

</body>
</html>
